name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Copiar arquivos para VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}

            ls -la
            echo "==> Atualizando código"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> (Opcional) gravando .env"
            if [ -n "${{ secrets.ENV_FILE }}" ]; then
              echo "${{ secrets.ENV_FILE }}" > .env
            fi

            echo "==> Atualizando containers"
            docker compose pull
            docker compose up -d

            echo "==> Status"
            docker compose ps
