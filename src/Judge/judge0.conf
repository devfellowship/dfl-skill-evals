# PostgreSQL
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=YourJudge0PostgresPassword

# Redis
REDIS_HOST=redis
REDIS_PORT=6379
# REDIS_PASSWORD=YourJudge0RedisPassword

# Rails
RAILS_ENV=production
SECRET_KEY_BASE=YourVeryLongSecretKeyBaseThatIsAtLeast32CharactersLong

# Database URL for Rails
DATABASE_URL=postgres://judge0:YourJudge0PostgresPassword@db:5432/judge0

# API
JUDGE0_VERSION=1.13.0
JUDGE0_HOMEPAGE=https://judge0.com
RAILS_MAX_THREADS=5
WEB_CONCURRENCY=2

# Security - DESABILITADO PARA DESENVOLVIMENTO WSL
ENABLE_ISOLATE=false
ENABLE_AUTHENTICATION=false
# BOX_ROOT=/var/local/lib/isolate  # Comentado
# JUDGE0_SANDBOX_USER_UID=1000     # Comentado
# JUDGE0_SANDBOX_USER_GID=1000     # Comentado

# Limits - Mais permissivos para desenvolvimento
MAX_QUEUE_SIZE=100
MAX_EXECUTION_TIME=10
MAX_CPU_TIME=10
MAX_MEMORY_LIMIT=1024000
MAX_STACK_LIMIT=512000
MAX_OUTPUT_SIZE=10485760
MAX_FILE_SIZE=10485760
MAX_NUMBER_OF_RUNS=50
ENABLE_ADDITIONAL_FILES=true

# Features - Simplificado para desenvolvimento
ENABLE_COMPILER_OPTIONS=false
ENABLE_COMMAND_LINE_ARGUMENTS=false
ENABLE_SUBMISSION_DELETE=true
ENABLE_CALLBACKS=false
ENABLE_RATE_LIMIT=false

# CORS
ALLOWED_ORIGINS=*

# Maintenance
MAINTENANCE_MODE=false
MAINTENANCE_MESSAGE="Judge0 is under maintenance."