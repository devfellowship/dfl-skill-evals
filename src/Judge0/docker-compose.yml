services:
  db:
    image: postgres:12
    container_name: judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: YourJudge0PostgresPassword
      POSTGRES_DB: devsharperDB
    volumes:
      - judge0-db:/var/lib/postgresql/data
    networks:
      - judge0

  redis:
    image: redis:6
    container_name: judge0-redis
    restart: unless-stopped
    networks:
      - judge0

  server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    restart: unless-stopped
    ports:
      - "2358:2358"
    environment:
      PORT: 2358
      ENABLE_ISOLATE: "true"
      RUN_UNTRUSTED_CODE_OUTSIDE_SANDBOX: "false"
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: YourJudge0PostgresPassword
      POSTGRES_DB: devsharperDB
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY_BASE: umaChaveSuperLongaESeguraQueVoceGereAqui
    volumes:
      - ./box:/box:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/local/lib/isolate:/var/local/lib/isolate
    depends_on:
      - db
      - redis
    networks:
      - judge0
    user: "0:0"
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined

  worker:
    image: judge0/judge0:1.13.1
    container_name: judge0-worker
    restart: unless-stopped
    environment:
      ENABLE_ISOLATE: "true"
      RUN_UNTRUSTED_CODE_OUTSIDE_SANDBOX: "false"
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: YourJudge0PostgresPassword
      POSTGRES_DB: devsharperDB
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY_BASE: umaChaveSuperLongaESeguraQueVoceGereAqui
      QUEUE: "1.13.1"
      COUNT: "2"
      INTERVAL: "0.1"
    volumes:
      - ./box:/box:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/local/lib/isolate:/var/local/lib/isolate
    depends_on:
      - db
      - redis
    networks:
      - judge0
    user: "0:0"
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined

volumes:
  judge0-db:

networks:
  judge0:
