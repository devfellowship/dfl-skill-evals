services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: devsharperDB
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: YourJudge0PostgresPassword
    ports:
      - "55432:5432"
    volumes:
      - judge0-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d devsharperDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    volumes:
      - judge0-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    image: judge0/judge0:1.13.1
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=devsharperDB
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=YourJudge0PostgresPassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY_BASE=umaChaveSuperLongaESeguraQueVoceGereAqui
      - RAILS_ENV=production
      - PORT=2358
      - ENABLE_ISOLATE=false       # 🔴 DESABILITADO para evitar erro de cgroup
      - DISABLE_SANDBOX=false
      - RUN_UNTRUSTED_CODE_OUTSIDE_SANDBOX=false
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      - MAX_FILE_SIZE=4096
      - MAX_OUTPUT_SIZE=4096
    volumes:
      - judge0-box:/box:rw
    ports:
      - "2358:2358"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: judge0/judge0:1.13.1
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=devsharperDB
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=YourJudge0PostgresPassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY_BASE=umaChaveSuperLongaESeguraQueVoceGereAqui
      - RAILS_ENV=production
      - ENABLE_ISOLATE=false       # 🔴 DESABILITADO para evitar erro de cgroup
      - DISABLE_SANDBOX=true
      - RUN_UNTRUSTED_CODE_OUTSIDE_SANDBOX=true
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
    volumes:
      - judge0-box:/box:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["./scripts/workers"]

volumes:
  judge0-db:
  judge0-redis:
  judge0-box:
