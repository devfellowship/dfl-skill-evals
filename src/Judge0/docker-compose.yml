# Removido version obsoleto

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: YourJudge0PostgresPassword
    ports:
      - "5432:5432"
    volumes:
      - judge0-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    volumes:
      - judge0-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.custom
    environment:
      # Configurações do banco
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=YourJudge0PostgresPassword
      # Configurações do Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Configurações Rails
      - SECRET_KEY_BASE=umaChaveSuperLongaESeguraQueVoceGereAqui
      - RAILS_ENV=production
      - PORT=2358
      # Configurações críticas para WSL/Windows
      - ENABLE_ISOLATE=false
      - DISABLE_SANDBOX=true
      - RUN_UNTRUSTED_CODE_OUTSIDE_SANDBOX=true
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
      # Limites
      - MAX_FILE_SIZE=4096
      - MAX_OUTPUT_SIZE=4096
    volumes:
      - judge0-box:/box:rw
    ports:
      - "2358:2358"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    restart: unless-stopped
    user: "0:0"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.custom
    environment:
      # Configurações do banco
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=YourJudge0PostgresPassword
      # Configurações do Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Configurações Rails
      - SECRET_KEY_BASE=umaChaveSuperLongaESeguraQueVoceGereAqui
      - RAILS_ENV=production
      # Configurações críticas para WSL/Windows
      - ENABLE_ISOLATE=false
      - DISABLE_SANDBOX=true
      - RUN_UNTRUSTED_CODE_OUTSIDE_SANDBOX=true
      - DISABLE_DATABASE_ENVIRONMENT_CHECK=1
    volumes:
      - judge0-box:/box:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    restart: unless-stopped
    user: "0:0"
    command: ["./scripts/workers"]

volumes:
  judge0-db:
  judge0-redis:
  judge0-box: